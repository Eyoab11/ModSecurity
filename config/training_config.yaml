# ML Model Training Pipeline Configuration

# Data Configuration
data:
  input_path: "data/processed/master_fused_payloads.csv"
  test_size: 0.2
  random_seed: 42

# Feature Extraction Configuration
features:
  max_features: 5000
  ngram_range: [2, 5]
  analyzer: "char"

# Model Training Configuration
training:
  algorithms:
    - "RandomForest"
    - "SVM"
    - "LogisticRegression"
  random_seed: 42
  
  # Algorithm-specific parameters
  random_forest:
    n_estimators: 100
    class_weight: "balanced"
    
  svm:
    kernel: "rbf"
    class_weight: "balanced"
    
  logistic_regression:
    penalty: "l2"
    max_iter: 1000
    class_weight: "balanced"

# Output Configuration
output:
  models_dir: "models"
  logs_dir: "logs"
  
# Incremental Training Configuration (optional)
incremental:
  enabled: false
  previous_model_path: null
  version_number: 1
